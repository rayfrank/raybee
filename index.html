<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Babe, I Love You</title>
  <style>
    :root {
      --ink: #fff8ef;
      --muted: rgba(255, 248, 239, 0.74);
      --glass: rgba(18, 14, 18, 0.34);
      --line: rgba(255, 248, 239, 0.2);
      --rose: #ff6f91;
      --gold: #f7c873;
      --night: #100d14;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at 50% 20%, #45202b 0%, #19111a 45%, #08070a 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(6, 4, 8, 0.72), transparent 23%, transparent 68%, rgba(6, 4, 8, 0.84)),
        radial-gradient(circle at 50% 48%, transparent 0 42%, rgba(4, 3, 6, 0.52) 76%, rgba(4, 3, 6, 0.78) 100%);
      z-index: 2;
    }

    .top-copy {
      position: fixed;
      top: clamp(18px, 4vw, 42px);
      left: 50%;
      z-index: 3;
      width: min(92vw, 780px);
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
    }

    .top-copy p {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: clamp(0.78rem, 2vw, 0.95rem);
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .top-copy h1 {
      margin: 0;
      text-wrap: balance;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.4rem, 9vw, 6.7rem);
      font-weight: 500;
      line-height: 0.92;
      letter-spacing: 0;
      text-shadow: 0 18px 50px rgba(0, 0, 0, 0.48);
    }

    .love-note {
      position: fixed;
      right: clamp(14px, 4vw, 42px);
      bottom: clamp(124px, 18vh, 178px);
      z-index: 3;
      width: min(320px, calc(100vw - 28px));
      padding: 18px 18px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(140deg, rgba(31, 22, 25, 0.68), rgba(18, 14, 20, 0.32));
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(18px);
    }

    .love-note strong {
      display: block;
      margin-bottom: 6px;
      color: #fff;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.1rem;
      font-weight: 500;
    }

    .love-note span {
      display: block;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.5;
    }

    .controls {
      position: fixed;
      left: 50%;
      bottom: clamp(18px, 4vw, 38px);
      z-index: 4;
      display: grid;
      grid-template-columns: 44px minmax(220px, 560px) 44px;
      align-items: center;
      gap: 12px;
      width: min(94vw, 710px);
      transform: translateX(-50%);
    }

    .icon-button,
    .memory-dot,
    .play-button {
      border: 1px solid var(--line);
      color: var(--ink);
      background: var(--glass);
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.26);
      backdrop-filter: blur(16px);
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .icon-button {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      font-size: 1.25rem;
      line-height: 1;
    }

    .icon-button:hover,
    .memory-dot:hover,
    .play-button:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.13);
    }

    .timeline {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      min-width: 0;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(12, 9, 13, 0.38);
      backdrop-filter: blur(18px);
    }

    .memory-dot {
      min-width: 0;
      height: 40px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .memory-dot.is-active {
      border-color: rgba(255, 255, 255, 0.68);
      background: linear-gradient(135deg, rgba(255, 111, 145, 0.64), rgba(247, 200, 115, 0.44));
      color: #fff;
    }

    .play-button {
      position: fixed;
      left: 50%;
      bottom: clamp(84px, 12vh, 116px);
      z-index: 4;
      display: none;
      min-width: 128px;
      height: 44px;
      transform: translateX(-50%);
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 800;
    }

    .play-button.is-visible {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .music-button {
      position: fixed;
      top: clamp(16px, 3vw, 28px);
      right: clamp(14px, 4vw, 34px);
      z-index: 5;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 118px;
      height: 42px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--ink);
      background: var(--glass);
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.26);
      backdrop-filter: blur(16px);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 800;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .music-button:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.13);
    }

    .media-source {
      display: none;
    }

    .fallback-gallery {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(5, minmax(180px, 1fr));
      gap: 14px;
      align-items: center;
      padding: 20vh 4vw 24vh;
      overflow: hidden;
    }

    .fallback-gallery img,
    .fallback-gallery video {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      border: 1px solid rgba(255, 248, 239, 0.24);
      border-radius: 8px;
      box-shadow: 0 24px 90px rgba(0, 0, 0, 0.38);
    }

    .fallback-gallery video {
      background: #000;
    }

    @media (max-width: 740px) {
      .top-copy {
        top: 18px;
        width: min(94vw, 360px);
      }

      .top-copy p {
        letter-spacing: 0.12em;
      }

      .top-copy h1 {
        font-size: clamp(1.95rem, 8vw, 2.25rem);
        line-height: 1;
      }

      .love-note {
        left: 14px;
        right: 14px;
        bottom: 106px;
        width: auto;
        padding: 14px 15px;
      }

      .love-note strong {
        font-size: 1rem;
      }

      .love-note span {
        font-size: 0.84rem;
      }

      .controls {
        grid-template-columns: 30px minmax(0, 1fr) 30px;
        gap: 6px;
        width: min(94vw, 360px);
        bottom: 14px;
      }

      .timeline {
        gap: 5px;
        padding: 6px;
      }

      .memory-dot {
        height: 34px;
        font-size: 0.54rem;
      }

      .icon-button {
        width: 30px;
        height: 30px;
        font-size: 1rem;
      }

      .play-button {
        bottom: 72px;
      }

      .music-button {
        top: auto;
        right: auto;
        left: 50%;
        bottom: 58px;
        transform: translateX(-50%);
        min-width: 104px;
        height: 34px;
        padding: 0 12px;
        font-size: 0.72rem;
      }

      .music-button:hover {
        transform: translateX(-50%) translateY(-2px);
      }

      .fallback-gallery {
        grid-template-columns: repeat(5, 74vw);
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        padding: 25vh 13vw 24vh;
      }

      .fallback-gallery img,
      .fallback-gallery video {
        scroll-snap-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="top-copy">
    <p>Two dates I keep replaying</p>
    <h1>Babe, I love you</h1>
  </div>

  <aside class="love-note" aria-live="polite">
    <strong id="memoryTitle">The sweet day</strong>
    <span id="memoryText">Every smile in these photos is a little proof that loving you is my favorite part of life.</span>
  </aside>

  <button class="play-button" id="playVideo" type="button">Play video</button>
  <button class="music-button" id="musicToggle" type="button">Play music</button>

  <nav class="controls" aria-label="Memory controls">
    <button class="icon-button" id="previous" type="button" title="Previous memory">&lt;</button>
    <div class="timeline" id="timeline"></div>
    <button class="icon-button" id="next" type="button" title="Next memory">&gt;</button>
  </nav>

  <div class="vignette"></div>

  <video
    id="loveVideo"
    class="media-source"
    src="WhatsApp%20Video%202026-05-11%20at%2013.57.45.mp4"
    playsinline
    loop
    preload="metadata"
  ></video>

  <audio
    id="backgroundMusic"
    class="media-source"
    src="Just%20Be%20Good.mp3"
    loop
    preload="auto"
  ></audio>

  <script type="module">
    const memories = [
      {
        type: "photo",
        label: "Day 1",
        title: "The sweet day",
        text: "Every smile in these photos is a little proof that loving you is my favorite part of life.",
        src: "WhatsApp%20Image%202026-05-11%20at%2013.57.45%20(1).jpeg",
        accent: 0xff6f91
      },
      {
        type: "photo",
        label: "Day 2",
        title: "The almost-kiss",
        text: "This one says it without trying too hard: you are home, laughter, and magic all at once.",
        src: "WhatsApp%20Image%202026-05-11%20at%2013.57.45.jpeg",
        accent: 0xf7c873
      },
      {
        type: "video",
        label: "Video",
        title: "A moment that moves",
        text: "I kept the video right in the middle because memories like this deserve to breathe.",
        accent: 0xff9f7a
      },
      {
        type: "photo",
        label: "Night",
        title: "The glowing night",
        text: "The lights, your face, that feeling; this date is still shining in my mind.",
        src: "WhatsApp%20Image%202026-05-11%20at%2013.57.45%20(2).jpeg",
        accent: 0xf2b35f
      },
      {
        type: "photo",
        label: "Always",
        title: "My favorite person",
        text: "No big speech, just the truth: I love you, babe. More than yesterday, still less than tomorrow.",
        src: "WhatsApp%20Image%202026-05-11%20at%2013.57.45%20(3).jpeg",
        accent: 0xff6f91
      }
    ];

    const music = document.getElementById("backgroundMusic");
    const musicToggle = document.getElementById("musicToggle");
    let musicWasStopped = false;

    async function startMusic() {
      if (!music || !music.paused) return;
      try {
        music.volume = 0.42;
        await music.play();
        musicToggle.textContent = "Pause music";
      } catch {
        musicToggle.textContent = "Play music";
      }
    }

    function stopMusic() {
      if (!music) return;
      music.pause();
      musicToggle.textContent = "Play music";
    }

    musicToggle.addEventListener("click", () => {
      if (music.paused) {
        musicWasStopped = false;
        startMusic();
      } else {
        musicWasStopped = true;
        stopMusic();
      }
    });

    let THREE;

    try {
      THREE = await import("https://unpkg.com/three@0.164.1/build/three.module.js");
    } catch {
      renderFallbackGallery();
    }

    if (THREE) {

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.prepend(renderer.domElement);

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x08070a, 0.045);

    const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.05, 8.8);

    const root = new THREE.Group();
    scene.add(root);

    const loader = new THREE.TextureLoader();
    const video = document.getElementById("loveVideo");
    const videoTexture = new THREE.VideoTexture(video);
    videoTexture.colorSpace = THREE.SRGBColorSpace;
    videoTexture.minFilter = THREE.LinearFilter;
    videoTexture.magFilter = THREE.LinearFilter;

    const titleEl = document.getElementById("memoryTitle");
    const textEl = document.getElementById("memoryText");
    const playButton = document.getElementById("playVideo");
    const previousButton = document.getElementById("previous");
    const nextButton = document.getElementById("next");
    const timeline = document.getElementById("timeline");

    let active = 0;
    let targetRotation = 0;
    let pointerStart = null;
    const cards = [];
    const dots = [];

    function roundedFrame(width, height, color) {
      const group = new THREE.Group();
      const frame = new THREE.Mesh(
        new THREE.PlaneGeometry(width + 0.16, height + 0.16),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.54 })
      );
      frame.position.z = -0.035;
      group.add(frame);

      const glow = new THREE.Mesh(
        new THREE.PlaneGeometry(width + 0.42, height + 0.42),
        new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity: 0.12,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        })
      );
      glow.position.z = -0.08;
      group.add(glow);
      return group;
    }

    function makeCard(memory, index) {
      const texture = memory.type === "video"
        ? videoTexture
        : loader.load(memory.src, (loaded) => {
            loaded.colorSpace = THREE.SRGBColorSpace;
            loaded.anisotropy = renderer.capabilities.getMaxAnisotropy();
          });

      const width = 2.55;
      const height = 3.42;
      const group = roundedFrame(width, height, memory.accent);
      group.userData.index = index;

      const plane = new THREE.Mesh(
        new THREE.PlaneGeometry(width, height),
        new THREE.MeshBasicMaterial({
          map: texture,
          toneMapped: false
        })
      );
      plane.position.z = 0;
      plane.userData.index = index;
      group.add(plane);

      const shine = new THREE.Mesh(
        new THREE.PlaneGeometry(width, height),
        new THREE.MeshBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 0.08,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        })
      );
      shine.position.set(-0.18, 0.24, 0.018);
      shine.rotation.z = -0.16;
      group.add(shine);

      root.add(group);
      cards.push({ group, plane, memory });
    }

    memories.forEach(makeCard);

    function makeParticles() {
      const count = 360;
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const colorA = new THREE.Color(0xff6f91);
      const colorB = new THREE.Color(0xf7c873);
      for (let i = 0; i < count; i += 1) {
        const radius = 4 + Math.random() * 7;
        const angle = Math.random() * Math.PI * 2;
        positions[i * 3] = Math.cos(angle) * radius;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 7.5;
        positions[i * 3 + 2] = Math.sin(angle) * radius - 2;
        const mixed = colorA.clone().lerp(colorB, Math.random());
        colors[i * 3] = mixed.r;
        colors[i * 3 + 1] = mixed.g;
        colors[i * 3 + 2] = mixed.b;
      }
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
      const material = new THREE.PointsMaterial({
        size: 0.045,
        vertexColors: true,
        transparent: true,
        opacity: 0.72,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
      const points = new THREE.Points(geometry, material);
      scene.add(points);
      return points;
    }

    const particles = makeParticles();

    memories.forEach((memory, index) => {
      const dot = document.createElement("button");
      dot.className = "memory-dot";
      dot.type = "button";
      dot.textContent = memory.label;
      dot.title = memory.title;
      dot.addEventListener("click", () => setActive(index));
      timeline.appendChild(dot);
      dots.push(dot);
    });

    function setActive(index) {
      active = (index + memories.length) % memories.length;
      targetRotation = -(active / memories.length) * Math.PI * 2;
      const memory = memories[active];
      titleEl.textContent = memory.title;
      textEl.textContent = memory.text;
      dots.forEach((dot, dotIndex) => dot.classList.toggle("is-active", dotIndex === active));
      playButton.classList.toggle("is-visible", memory.type === "video");
      playButton.textContent = video.paused ? "Play video" : "Pause video";
    }

    function next() {
      setActive(active + 1);
    }

    function previous() {
      setActive(active - 1);
    }

    previousButton.addEventListener("click", previous);
    nextButton.addEventListener("click", next);

    playButton.addEventListener("click", async () => {
      if (video.paused) {
        try {
          video.muted = false;
          await video.play();
          if (!music.paused) music.volume = 0.18;
          playButton.textContent = "Pause video";
        } catch {
          video.muted = true;
          await video.play();
          playButton.textContent = "Pause video";
        }
      } else {
        video.pause();
        if (!music.paused) music.volume = 0.42;
        playButton.textContent = "Play video";
      }
    });

    window.addEventListener("keydown", (event) => {
      if (!musicWasStopped) startMusic();
      if (event.key === "ArrowRight") next();
      if (event.key === "ArrowLeft") previous();
      if (event.key === " " && memories[active].type === "video") {
        event.preventDefault();
        playButton.click();
      }
    });

    window.addEventListener("pointerdown", (event) => {
      if (!musicWasStopped) startMusic();
      pointerStart = { x: event.clientX, y: event.clientY };
    });

    window.addEventListener("pointerup", (event) => {
      if (!pointerStart) return;
      const dx = event.clientX - pointerStart.x;
      const dy = event.clientY - pointerStart.y;
      pointerStart = null;
      if (Math.abs(dx) > 46 && Math.abs(dx) > Math.abs(dy)) {
        dx < 0 ? next() : previous();
      }
    });

    function resize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      renderer.setSize(width, height);
      camera.aspect = width / height;
      camera.position.z = width < 740 ? 10.8 : 8.8;
      camera.fov = width < 740 ? 44 : 38;
      camera.updateProjectionMatrix();
    }

    window.addEventListener("resize", resize);

    const clock = new THREE.Clock();

    function animate() {
      const elapsed = clock.getElapsedTime();
      root.rotation.y += (targetRotation - root.rotation.y) * 0.075;
      root.position.y = Math.sin(elapsed * 0.55) * 0.08;
      particles.rotation.y = elapsed * 0.025;
      particles.position.y = Math.sin(elapsed * 0.28) * 0.18;

      const radius = window.innerWidth < 740 ? 4.25 : 4.7;
      cards.forEach(({ group }, index) => {
        const angle = (index / memories.length) * Math.PI * 2;
        const current = angle + root.rotation.y;
        const focus = Math.cos(current);
        group.position.set(Math.sin(angle) * radius, Math.sin(elapsed * 0.8 + index) * 0.08, Math.cos(angle) * radius - 1.2);
        group.lookAt(camera.position.x, camera.position.y, camera.position.z);
        group.scale.setScalar(0.72 + Math.max(0, focus) * 0.4);
        group.children.forEach((child) => {
          if (child.material) {
            child.material.opacity = child.material.map ? 0.62 + Math.max(0, focus) * 0.38 : child.material.opacity;
          }
        });
      });

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    resize();
    setActive(0);
    animate();
    }

    function renderFallbackGallery() {
      const gallery = document.createElement("div");
      gallery.className = "fallback-gallery";

      memories.forEach((memory) => {
        if (memory.type === "video") {
          const fallbackVideo = document.createElement("video");
          fallbackVideo.src = "WhatsApp%20Video%202026-05-11%20at%2013.57.45.mp4";
          fallbackVideo.controls = true;
          fallbackVideo.playsInline = true;
          fallbackVideo.loop = true;
          gallery.appendChild(fallbackVideo);
          return;
        }

        const image = document.createElement("img");
        image.src = memory.src;
        image.alt = memory.title;
        gallery.appendChild(image);
      });

      document.body.prepend(gallery);
      document.getElementById("playVideo").remove();
      document.querySelector(".controls").remove();
    }
  </script>
</body>
</html>
